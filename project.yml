name: SwiftDownloader
options:
  bundleIdPrefix: com.adilemre
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  groupSortPosition: top

fileGroups:
  - SwiftDownloader.xctestplan

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: "GHV7BT96W7"

targets:
  SwiftDownloader:
    type: application
    platform: macOS
    sources:
      - SwiftDownloader
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adilemre.SwiftDownloader
        INFOPLIST_FILE: SwiftDownloader/Info.plist
        CODE_SIGN_ENTITLEMENTS: SwiftDownloader/SwiftDownloader.entitlements
        PRODUCT_NAME: Fetchora
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    entitlements:
      path: SwiftDownloader/SwiftDownloader.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.adilemre.SwiftDownloader
    dependencies:
      - target: "SwiftDownloader Extension"

  SwiftDownloader Extension:
    type: app-extension
    platform: macOS
    sources:
      - SwiftDownloader Extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adilemre.SwiftDownloader.Extension
        INFOPLIST_FILE: "SwiftDownloader Extension/Info.plist"
        PRODUCT_NAME: "Fetchora Extension"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks @executable_path/../../../../Frameworks"
        SWIFT_EMIT_LOC_STRINGS: true
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: "SwiftDownloader Extension/SwiftDownloader_Extension.entitlements"
    entitlements:
      path: "SwiftDownloader Extension/SwiftDownloader_Extension.entitlements"
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.adilemre.SwiftDownloader

  SwiftDownloaderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SwiftDownloaderTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.adilemre.SwiftDownloaderTests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Fetchora.app/Contents/MacOS/Fetchora"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: SwiftDownloader

schemes:
  SwiftDownloader:
    build:
      targets:
        SwiftDownloader: all
        SwiftDownloader Extension: [build]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      testPlans:
        - path: SwiftDownloader.xctestplan
          defaultPlan: true
      targets:
        - name: SwiftDownloaderTests
    archive:
      config: Release

  SwiftDownloaderTests:
    build:
      targets:
        SwiftDownloaderTests: all
    test:
      config: Debug
      gatherCoverageData: true
      testPlans:
        - path: SwiftDownloader.xctestplan
          defaultPlan: true
      targets:
        - name: SwiftDownloaderTests

  SwiftDownloader Extension:
    build:
      targets:
        SwiftDownloader Extension: all
